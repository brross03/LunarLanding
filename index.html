<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Lander: Vanguard Final</title>
    <style>
        body { background-color: #050508; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { position: relative; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        canvas { display: block; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .stats { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px; border-left: 3px solid #00ff41; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; text-align: center; display: none; background: rgba(0,0,0,0.95); padding: 30px; border: 2px solid #00ff41; z-index: 10; }
        .safe { color: #00ff41; }
        .danger { color: #ff3333; }
        
        /* Mute Button Styles */
        #mute-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            z-index: 20;
        }
        #mute-btn:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>

    <h2>LUNAR LANDER: <span id="current-lvl-text">LEVEL 1</span></h2>

    <div id="game-container">
        <button id="mute-btn">🔊 MUSIC: ON</button>
        <div class="stats">
            FUEL: <span id="fuel">100</span>%<br>
            V-SPEED: <span id="speed">0</span> (MAX 2.0)<br>
            H-SPEED: <span id="hSpeed">0</span> (MAX 0.8)<br>
            <span id="drift-warning" style="color:#0088ff"></span>
        </div>
        <div id="message"></div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <p>[Arrows] to Pilot | Space to Start Mission</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fuelEl = document.getElementById('fuel');
        const speedEl = document.getElementById('speed');
        const hSpeedEl = document.getElementById('hSpeed');
        const msgEl = document.getElementById('message');
        const levelText = document.getElementById('current-lvl-text');
        const driftText = document.getElementById('drift-warning');
        const muteBtn = document.getElementById('mute-btn');

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const musicMain = new Audio('main_theme_8bit.mp3');
        const musicCrash = new Audio('crash_sad.mp3');
        const musicVictory = new Audio('victory_happy.mp3');
        
        musicMain.loop = true;
        let isMusicPlaying = false;
        let isMuted = false;

        function playTrack(track) {
            [musicMain, musicCrash, musicVictory].forEach(t => {
                t.pause();
                t.currentTime = 0;
            });
            track.muted = isMuted;
            track.play();
        }

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? "🔇 MUSIC: OFF" : "🔊 MUSIC: ON";
            
            // Apply to all tracks immediately
            [musicMain, musicCrash, musicVictory].forEach(t => t.muted = isMuted);
            
            // If we are mid-game and unmuting, make sure music starts
            if (!isMuted && isMusicPlaying && !lander.gameOver) {
                musicMain.play();
            }
            
            // Blur the button so Space bar doesn't trigger it again
            muteBtn.blur();
        });

        // --- GAME LOGIC ---
        let currentLevel = 1;
        let lander, stars, padWidth, gravity, asteroids, solarWind;
        let animationId;
        let keys = {};

        function setupLevel(lvl) {
            cancelAnimationFrame(animationId);
            currentLevel = lvl;
            levelText.innerText = "LEVEL " + lvl;
            solarWind = (lvl === 4) ? -0.015 : 0;
            driftText.innerText = (lvl === 4) ? "SOLAR WIND DETECTED" : "";
            
            gravity = [0, 0.015, 0.022, 0.030, 0.038][lvl];
            padWidth = [0, 80, 50, 30, 20][lvl];
            const asteroidCount = [0, 0, 3, 5, 7][lvl];

            asteroids = [];
            for (let i = 0; i < asteroidCount; i++) {
                asteroids.push({
                    x: Math.random() * 400 + 100,
                    y: 100 + (i * 45),
                    radius: (lvl === 4 && i === 0) ? 25 : 10,
                    speed: (1.5 + (lvl * 0.5)) * (Math.random() > 0.5 ? 1 : -1)
                });
            }

            lander = { x: 300, y: 50, velocityX: 0, velocityV: 0, thrustV: 0.07, thrustH: 0.03, fuel: 100, gameOver: false, won: false };
            stars = Array.from({length: 60}, () => ({ x: Math.random()*600, y: Math.random()*400, s: Math.random()*2 }));
            msgEl.style.display = 'none';
            
            if (isMusicPlaying && !isMuted) playTrack(musicMain);
            animate();
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                if (!isMusicPlaying) {
                    isMusicPlaying = true;
                    if (!isMuted) playTrack(musicMain);
                }
                if (lander.gameOver) {
                    if (lander.won && currentLevel < 4) setupLevel(currentLevel + 1);
                    else if (lander.won && currentLevel === 4) setupLevel(1);
                    else setupLevel(currentLevel);
                }
            }
        });

        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function update() {
            if (!lander || lander.gameOver) return;
            lander.velocityV += gravity;
            lander.velocityX += solarWind;

            if (lander.fuel > 0) {
                if (keys['ArrowUp']) { lander.velocityV -= lander.thrustV; lander.fuel -= 0.3; }
                if (keys['ArrowLeft']) { lander.velocityX -= lander.thrustH; lander.fuel -= 0.1; }
                if (keys['ArrowRight']) { lander.velocityX += lander.thrustH; lander.fuel -= 0.1; }
            }

            lander.y += lander.velocityV; lander.x += lander.velocityX;
            if (lander.x < 0) lander.x = 600; if (lander.x > 600) lander.x = 0;

            asteroids.forEach(a => {
                a.x += a.speed;
                if (a.x > 585 || a.x < 15) a.speed *= -1;
                if (Math.hypot(lander.x - a.x, lander.y - a.y) < a.radius + 12) {
                    lander.gameOver = true;
                    playTrack(musicCrash);
                    checkLanding(true);
                }
            });

            fuelEl.innerText = Math.max(0, Math.floor(lander.fuel));
            speedEl.innerText = lander.velocityV.toFixed(2);
            speedEl.className = lander.velocityV < 2.0 ? "safe" : "danger";
            hSpeedEl.innerText = Math.abs(lander.velocityX).toFixed(2);
            hSpeedEl.className = Math.abs(lander.velocityX) < 0.8 ? "safe" : "danger";

            if (lander.y + 25 >= 380) {
                lander.gameOver = true; lander.y = 355;
                checkLanding(false);
            }
        }

        function checkLanding(hitAsteroid) {
            msgEl.style.display = 'block';
            if (hitAsteroid) {
                msgEl.innerHTML = "<span class='danger'>COLLISION!</span><br><small>Space to retry</small>";
                return;
            }
            const vSafe = lander.velocityV < 2.0;
            const hSafe = Math.abs(lander.velocityX) < 0.8;
            const onPad = lander.x > (300 - padWidth/2) && lander.x < (300 + padWidth/2);

            if (vSafe && hSafe && onPad) {
                lander.won = true;
                if (currentLevel === 4) {
                    playTrack(musicVictory);
                    msgEl.innerHTML = "<span class='safe'>GRAND MASTER!</span><br><small>Space to restart journey</small>";
                } else {
                    msgEl.innerHTML = "<span class='safe'>TOUCHDOWN!</span><br><small>Space for Next Level</small>";
                }
            } else {
                playTrack(musicCrash);
                msgEl.innerHTML = "<span class='danger'>CRASH!</span><br><small>Space to retry</small>";
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 400);
            ctx.fillStyle = "white"; stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));
            ctx.fillStyle = ["#ff3333", "#ff3333", "#ff3333", "#ff00ff", "#0088ff"][currentLevel];
            asteroids.forEach(a => { ctx.beginPath(); ctx.arc(a.x, a.y, a.radius, 0, Math.PI*2); ctx.fill(); });
            ctx.strokeStyle = "#444"; ctx.beginPath(); ctx.moveTo(0, 380); ctx.lineTo(600, 380); ctx.stroke();
            ctx.strokeStyle = "#00ff41"; ctx.lineWidth = 3; ctx.strokeRect(300 - padWidth/2, 380, padWidth, 5); ctx.lineWidth = 1;
            ctx.save(); ctx.translate(lander.x, lander.y);
            if (keys['ArrowUp'] && lander.fuel > 0) { ctx.fillStyle = '#ff6600'; ctx.beginPath(); ctx.moveTo(-5,15); ctx.lineTo(0,30); ctx.lineTo(5,15); ctx.fill(); }
            if (keys['ArrowLeft'] && lander.fuel > 0) { ctx.fillStyle = '#0088ff'; ctx.beginPath(); ctx.moveTo(15,-5); ctx.lineTo(25,0); ctx.lineTo(15,5); ctx.fill(); }
            if (keys['ArrowRight'] && lander.fuel > 0) { ctx.fillStyle = '#0088ff'; ctx.beginPath(); ctx.moveTo(-15,-5); ctx.lineTo(-25,0); ctx.lineTo(-15,5); ctx.fill(); }
            ctx.strokeStyle = (lander.gameOver && !lander.won) ? '#ff3333' : '#00ff41';
            ctx.strokeRect(-15, -15, 30, 30); ctx.restore();
        }

        function animate() { update(); draw(); animationId = requestAnimationFrame(animate); }
        setupLevel(1);
    </script>
</body>
</html>
